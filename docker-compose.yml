version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: workcheck-db
    environment:
      POSTGRES_DB: workcheck
      POSTGRES_USER: workcheck
      POSTGRES_PASSWORD: workcheck_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./workCheck_backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./workCheck_backend/src/main/resources/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workcheck"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./workCheck_backend
      dockerfile: Dockerfile
    container_name: workcheck-api
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/workcheck
      SPRING_DATASOURCE_USERNAME: workcheck
      SPRING_DATASOURCE_PASSWORD: workcheck_dev
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_SQL_INIT_MODE: never
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./workCheck/admin_web
      dockerfile: Dockerfile
    container_name: workcheck-web
    ports:
      - "3002:80"
    depends_on:
      - api

volumes:
  postgres_data:
