server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workcheck}
    username: ${SPRING_DATASOURCE_USERNAME:workcheck}
    password: ${SPRING_DATASOURCE_PASSWORD:workcheck_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:workcheck-mvp-jwt-secret-key-for-development-only}
  expiration: ${JWT_EXPIRATION:86400000}
